# tmux options that make OSC 52 clipboard traffic work — append to
# ~/.tmux.conf or load with: tmux source-file examples/tmux.conf

# Let applications write the clipboard through tmux itself. With this
# on, tmux intercepts plain OSC 52 and re-emits it to the attached
# client, so even unwrapped sequences work. "external" allows setting
# but not reading; "on" also lets applications query.
set -g set-clipboard on

# Allow DCS passthrough envelopes (ESC Ptmux; ... ESC \) to reach the
# outer terminal. Required on tmux >= 3.3, where passthrough became
# opt-in; earlier versions always forwarded these envelopes. clipwarp
# wraps automatically whenever $TMUX is set, so keep this on.
set -g allow-passthrough on

# Optional: make new panes advertise a tmux TERM so tools (including
# clipwarp's nesting tiebreak) can tell tmux is the innermost layer.
set -g default-terminal "tmux-256color"
